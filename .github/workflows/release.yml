name: Create Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Extension Archive
        run: |
          mkdir -p dist
          git archive --format=zip -o dist/ADTMainpage.zip HEAD:src/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/ADTMainpage.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}